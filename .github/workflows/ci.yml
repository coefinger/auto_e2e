name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make setup

      - name: Lint with ruff
        run: make lint

      - name: Type-check with mypy
        run: make typecheck

      - name: Run unit tests
        run: make test
